<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OS — Andres Villamil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── DARK THEME (default) ── */
    :root {
      --bg: #09090B;
      --bg2: #111827;
      --bg3: #1F2937;
      --border: #374151;
      --border2: #1F2937;
      --text: #F9FAFB;
      --text2: #D1D5DB;
      --text3: #9CA3AF;
      --text4: #4B5563;
      --green: #1D9E75;
      --green-bg: #0a2018;
      --green-border: #0f3a28;
      --amber: #EF9F27;
      --amber-bg: #1a1200;
      --amber-border: #3a2800;
      --red: #E24B4A;
      --red-bg: #2a0a0a;
      --red-border: #4a1010;
      --purple: #00D4FF;
      --purple-light: #33DDFF;
      --purple-bg: #062730;
      --purple-border: #0B4A5C;
      --purple-ink: #04171D;
      --blue: #378ADD;
      --blue-bg: #0c1a2e;
      --topbar-bg: #09090B;
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      /* ── FOUNDATION SCALE (additive — nothing above this line is renamed) ── */
      --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
      --sp-5: 24px; --sp-6: 32px; --sp-7: 48px; --sp-8: 64px;

      --radius-sm: 8px; --radius-md: 14px; --radius-lg: 20px;

      --fs-xs: 11px; --fs-sm: 12px; --fs-base: 14px; --fs-md: 16px;
      --fs-lg: 20px; --fs-xl: 28px; --fs-2xl: 40px; --fs-3xl: 56px;

      --shadow-sm: 0 1px 2px rgba(0,0,0,.30);
      --shadow-md: 0 4px 16px rgba(0,0,0,.35), 0 1px 2px rgba(0,0,0,.40);
      --shadow-lg: 0 16px 48px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.30);

      --ease: cubic-bezier(.16,1,.3,1);
      --dur-fast: 150ms; --dur-base: 250ms; --dur-slow: 500ms;
    }

    /* ── LIGHT MODE ── */
    body.theme-cream {
      --bg: #FFFFFF;
      --bg2: #F8FAFC;
      --bg3: #F1F5F9;
      --border: #E2E8F0;
      --border2: #EDF1F5;
      --text: #0F172A;
      --text2: #334155;
      --text3: #64748B;
      --text4: #8B98A9;
      --green: #0F7A58;
      --green-bg: #E4F3EC;
      --green-border: #A8D8C4;
      --amber: #A86C0A;
      --amber-bg: #FBF1DC;
      --amber-border: #E8CC88;
      --red: #C0312F;
      --red-bg: #FAEAEA;
      --red-border: #EBB4B4;
      --purple: #0099CC;
      --purple-light: #007399;
      --purple-bg: #E6F6FC;
      --purple-border: #A8DEEF;
      --purple-ink: #04171D;
      --blue: #1A68C0;
      --blue-bg: #E4EEF9;
      --topbar-bg: #F8FAFC;
      --shadow-sm: 0 1px 2px rgba(30,24,12,.06);
      --shadow-md: 0 4px 16px rgba(30,24,12,.08), 0 1px 2px rgba(30,24,12,.06);
      --shadow-lg: 0 16px 48px rgba(30,24,12,.10), 0 2px 8px rgba(30,24,12,.06);
    }

    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; transition: background .2s, color .2s; }

    /* ── TOP BAR ── */
    .topbar { position: sticky; top: 0; z-index: 100; background: var(--topbar-bg); border-bottom: 0.5px solid var(--border2); padding: 10px 20px 0; transition: background .2s; }
    .tb-nav-row { display: flex; align-items: center; gap: var(--sp-5); }
    .tb-logo { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .tb-icon { font-size: 18px; }
    .tb-title { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -.01em; }

    .nav-tabs { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; flex: 1; }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .tab-btn { display: flex; align-items: center; gap: 5px; padding: 9px 12px; border: none; border-bottom: 2px solid transparent; border-radius: 0; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; background: transparent; color: var(--text4); transition: color var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease); user-select: none; }
    .tab-btn:hover { color: var(--text2); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--purple); font-weight: 600; }

    .tb-right-cluster { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .tb-icon-group { display: flex; align-items: center; gap: 2px; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 3px; }
    .tb-clock { text-align: right; line-height: 1.15; }
    .tb-clock-time { font-size: 14px; font-weight: 600; color: var(--text2); font-variant-numeric: tabular-nums; }
    .tb-clock-date { display: block; font-size: 10px; color: var(--text4); margin-top: 1px; }

    /* ── THEME TOGGLE BUTTON ── */
    .theme-toggle {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
      border: none; background: transparent;
      color: var(--text3); font-size: 11px; font-weight: 500;
      transition: all .15s; white-space: nowrap; user-select: none;
    }
    .theme-toggle:hover { background: var(--bg3); color: var(--purple-light); }
    .theme-toggle-icon { font-size: 14px; }

    /* ── HERO IDENTITY ROW ── */
    .tb-hero { text-align: left; padding: 14px 0 12px; }
    .tb-hero-greeting { font-size: var(--fs-lg); font-weight: 700; color: var(--text); letter-spacing: -.01em; font-family: var(--font); font-style: normal; }
    .tb-hero-sub { font-size: var(--fs-sm); color: var(--text3); margin-top: 2px; }
    .tb-status { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; font-size: 12px; color: var(--text3); }
    .tb-status span { display: flex; align-items: center; gap: 4px; }
    .tb-status-sep { color: var(--border); }

    /* ── MAIN CONTENT ── */
    .main { padding: 20px; max-width: 1400px; margin: 0 auto; }
    .main.main-wide { max-width: none; }

    /* ── CARDS ── */
    .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: var(--sp-5); margin-bottom: var(--sp-4); box-shadow: var(--shadow-sm); transition: background var(--dur-base) var(--ease), border-color var(--dur-base) var(--ease), box-shadow var(--dur-base) var(--ease); }
    .card:hover { box-shadow: var(--shadow-md); }
    .card-title { font-size: var(--fs-xs); font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: var(--sp-3); }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp-3); }
    .card-meta { font-size: var(--fs-xs); color: var(--text4); }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); }
    @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } .main { padding: 12px; } }

    /* ── HERO (Daily tab focal point) ── */
    .hero-card { background: linear-gradient(160deg, var(--bg2) 0%, var(--bg3) 100%); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: var(--sp-6); margin-bottom: var(--sp-5); box-shadow: var(--shadow-lg); }
    .hero-top { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--sp-4); flex-wrap: wrap; }
    .hero-label { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: .08em; color: var(--text4); margin-bottom: var(--sp-1); }
    .hero-value { font-size: var(--fs-3xl); font-weight: 700; letter-spacing: -.02em; line-height: 1; font-variant-numeric: tabular-nums; }
    .hero-sub { font-size: var(--fs-sm); color: var(--text3); margin-top: var(--sp-2); }
    .hero-status-pill { font-size: var(--fs-xs); font-weight: 600; padding: 6px 12px; border-radius: 20px; white-space: nowrap; background: var(--bg2); }
    .hero-progress-track { height: 8px; border-radius: 8px; background: var(--bg); overflow: hidden; margin-top: var(--sp-5); }
    .hero-progress-fill { height: 100%; border-radius: 8px; transition: width var(--dur-slow) var(--ease); }
    .hero-progress-caption { font-size: var(--fs-xs); color: var(--text4); margin-top: var(--sp-2); display: flex; justify-content: space-between; }
    .hero-mission { font-size: var(--fs-xs); font-style: italic; color: var(--text4); margin-top: var(--sp-5); padding-top: var(--sp-4); border-top: 0.5px solid var(--border2); line-height: 1.6; }
    @media (max-width: 700px) { .hero-value { font-size: var(--fs-2xl); } }

    /* ── IDENTITY BANNER ── */
    .identity-banner { border-left: 2px solid var(--purple); padding: 10px 14px; background: var(--purple-bg); border-radius: 0 8px 8px 0; margin-bottom: 16px; font-size: 12px; color: var(--purple-light); line-height: 1.7; font-style: italic; font-weight: 500; }

    /* ── CHECKLISTS ── */
    .check-row { display: flex; align-items: center; gap: var(--sp-3); padding: 9px 0; border-bottom: 0.5px solid var(--border2); }
    .check-row:last-child { border-bottom: none; }
    .check-row input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; accent-color: var(--green); cursor: pointer; }
    .check-label { font-size: var(--fs-sm); color: var(--text2); }

    .goal-slot { display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-4); background: var(--bg3); border-radius: var(--radius-sm); margin-bottom: var(--sp-2); border: 0.5px solid var(--border2); transition: border-color var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease); }
    .goal-slot:focus-within { border-color: var(--purple-border); background: var(--purple-bg); }
    .goal-num { display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; background: var(--purple-bg); font-size: var(--fs-xs); font-weight: 700; color: var(--purple-light); flex-shrink: 0; }
    .goal-slot input[type="text"] { flex: 1; background: transparent; border: none; font-size: var(--fs-base); color: var(--text2); outline: none; font-family: var(--font); }

    .btn-secondary { background: var(--purple); color: var(--purple-ink); border: none; border-radius: var(--radius-sm); padding: 9px 16px; font-size: var(--fs-xs); font-weight: 600; cursor: pointer; box-shadow: var(--shadow-sm); transition: transform var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease); }
    .btn-secondary:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-secondary:active { transform: translateY(0); }
    .muted-italic { color: var(--text4); font-style: italic; }

    /* ── FORMS ── */
    input[type="text"], input[type="email"], input[type="password"], input[type="number"], input[type="date"], input[type="time"], textarea, select { background: var(--bg3); border: 0.5px solid var(--border); border-radius: 7px; padding: 7px 10px; font-size: 12px; color: var(--text2); outline: none; font-family: var(--font); }
    textarea { resize: vertical; min-height: 56px; width: 100%; }
    select { cursor: pointer; }

    /* ── TRADING JOURNAL ── */
    .journal-field { display: flex; flex-direction: column; gap: 4px; }
    .journal-field label { font-size: 10px; color: var(--text4); text-transform: uppercase; letter-spacing: .05em; }
    .journal-field input, .journal-field select, .journal-field textarea { width: 100%; }
    .journal-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .journal-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .tag-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .tag-chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg3); color: var(--text3); font-size: 11px; cursor: pointer; user-select: none; transition: all .12s; }
    .tag-chip:hover { border-color: var(--border); color: var(--text2); }
    .tag-chip.selected { background: var(--purple-bg); border-color: var(--purple-border); color: var(--purple-light); font-weight: 500; }
    .tag-chip .tag-remove { opacity: .6; font-size: 12px; margin-left: 2px; }
    .tag-chip .tag-remove:hover { opacity: 1; color: var(--red); }
    .tag-add-row { display: flex; gap: 6px; margin-top: 6px; }
    .tag-add-row input { flex: 1; }
    .journal-section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--purple-light); margin: 18px 0 10px; padding-top: 14px; border-top: 0.5px solid var(--border2); }
    .journal-section-label:first-child { margin-top: 0; padding-top: 0; border-top: none; }
    .tag-chip.tag-add-toggle { border-style: dashed; color: var(--text4); background: transparent; }
    .tag-chip.tag-add-toggle:hover { color: var(--purple-light); border-color: var(--purple-border); }
    .journal-entry-row { cursor: pointer; padding: 6px 12px; border-radius: 6px; }
    .journal-entry-row:hover { background: var(--bg3); }
    .journal-entry-detail { display: none; margin: 8px 12px 10px; padding-top: 10px; border-top: 0.5px dashed var(--border2); font-size: 12px; color: var(--text2); }
    .journal-entry-detail.open { display: block; }
    .journal-result-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: .04em; }
    .journal-result-badge.win { background: var(--green-bg); color: var(--green); }
    .journal-result-badge.loss { background: var(--red-bg); color: var(--red); }
    .journal-result-badge.be { background: var(--bg3); color: var(--text4); }
    .journal-links a { color: var(--blue); text-decoration: none; font-size: 11px; word-break: break-all; }
    .journal-links a:hover { text-decoration: underline; }

    /* Weekly compilation — collapsible group header with rolled-up stats */
    .journal-week-group { margin-bottom: 4px; }
    .journal-week-header { display: flex; align-items: center; gap: 14px; padding: 10px 12px; background: var(--bg3); border-radius: 8px; cursor: pointer; user-select: none; margin-top: 10px; }
    .journal-week-header:hover { background: var(--purple-bg); }
    .journal-week-range { font-size: 12px; font-weight: 500; color: var(--text2); }
    .journal-week-stats { display: flex; gap: 14px; margin-left: auto; font-size: 11px; color: var(--text4); }
    .journal-week-stats b { color: var(--text3); font-weight: 500; }
    .journal-week-chevron { font-size: 10px; color: var(--text4); transition: transform .15s; }
    .journal-week-chevron.open { transform: rotate(90deg); }
    .journal-week-entries { display: none; }
    .journal-week-entries.open { display: block; }

    /* Grid-aligned entry rows, replacing loose flex so dates/badges/PnL line up like a table */
    .journal-row-grid { display: grid; grid-template-columns: 78px 38px 1fr 44px 68px 76px; gap: 10px; align-items: center; }
    .journal-col-header { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--text4); padding: 6px 12px 4px; }
    @media (max-width: 700px) {
      .journal-row-grid { grid-template-columns: 58px 1fr 50px 60px; }
      .journal-row-grid > :nth-child(2), .journal-row-grid > :nth-child(4) { display: none; } /* hide day-of-week + type cols on mobile */
      .journal-col-header { display: none; }
    }
    @media (max-width: 700px) {
      .journal-grid-2, .journal-grid-3 { grid-template-columns: 1fr; }
    }

    /* ── LOGIN SCREEN ── */
    /* ── MATRIX LOGIN SCREEN ── */
    .matrix-login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #000; position: relative; overflow: hidden;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
    }
    #matrix-rain-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    .matrix-login-box {
      position: relative; z-index: 1; width: 100%; max-width: 340px;
      background: rgba(0,0,0,0.78); border: 1px solid #0F0; border-radius: 6px;
      padding: 34px 28px; text-align: center;
      box-shadow: 0 0 28px rgba(0,255,70,0.25), inset 0 0 24px rgba(0,255,70,0.05);
      animation: matrix-flicker-in .6s ease;
    }
    @keyframes matrix-flicker-in { 0% { opacity: 0; } 40% { opacity: .6; } 55% { opacity: .2; } 100% { opacity: 1; } }
    .matrix-login-title {
      color: #0F0; font-size: 18px; letter-spacing: 3px; margin-bottom: 6px; text-transform: uppercase;
      text-shadow: 0 0 8px rgba(0,255,70,0.8);
    }
    .matrix-login-sub { color: #0a0; font-size: 11px; letter-spacing: 3px; margin-bottom: 26px; text-transform: uppercase; opacity: .75; }
    .matrix-login-form { display: flex; flex-direction: column; gap: 16px; }
    .matrix-input-wrap {
      display: flex; align-items: center; gap: 8px; border: 1px solid #0a0; border-radius: 4px;
      padding: 11px 12px; background: rgba(0,25,0,0.4);
    }
    .matrix-input-wrap span { color: #0F0; font-size: 13px; }
    .matrix-login-form input[type="password"] {
      flex: 1; background: transparent; border: none; outline: none; color: #0F0;
      font-family: inherit; font-size: 14px; letter-spacing: 3px;
    }
    .matrix-login-form input::placeholder { color: rgba(0,255,70,0.3); letter-spacing: 1px; }
    .matrix-login-btn {
      background: #0F0; color: #000; border: none; border-radius: 4px; padding: 11px;
      font-family: inherit; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
      font-size: 12px; cursor: pointer; transition: box-shadow .2s;
    }
    .matrix-login-btn:hover { box-shadow: 0 0 18px rgba(0,255,70,0.6); }
    .matrix-login-error { color: #ff3b3b; font-size: 11px; margin-top: 16px; letter-spacing: 1px; min-height: 14px; }

    /* ── TRADING TAB ── */
    .stat-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--sp-3); }
    .stat-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-3); }
    .stat-box { background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: var(--sp-4); text-align: center; transition: transform var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease); }
    .stat-box:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .stat-box-value { font-size: var(--fs-lg); font-weight: 600; letter-spacing: -.01em; }
    .stat-box-label { font-size: 10px; color: var(--text4); text-transform: uppercase; letter-spacing: .06em; margin-top: var(--sp-1); }
    .chart-wrap { position: relative; height: 220px; margin-top: 6px; }
    .chart-wrap-sm { position: relative; height: 180px; margin-top: 6px; }
    .upload-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .upload-status { font-size: 11px; color: var(--text4); }
    .settings-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .settings-field label { font-size: 10px; color: var(--text4); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
    .settings-field input { width: 100%; }
    .progress-track { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; background: var(--purple); border-radius: 4px; transition: width .3s; }
    .file-input-btn { display: inline-block; background: var(--purple); color: var(--purple-ink); border-radius: 7px; padding: 7px 14px; font-size: 11px; font-weight: 500; cursor: pointer; }
    .file-input-btn input { display: none; }
    .settings-gear-btn { cursor: pointer; font-size: 15px; opacity: .55; transition: opacity .15s, transform .15s; user-select: none; padding: 2px 4px; }
    .settings-gear-btn:hover { opacity: 1; transform: rotate(20deg); }
    .settings-panel { margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border2); }

    /* ── CALENDAR TAB — hour-based time grid ── */
    .week-nav-btn { background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text2); border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer; white-space: nowrap; }
    .week-nav-btn:hover { border-color: var(--purple-border); color: var(--purple-light); }

    .cal-grid-wrap { display: flex; flex-direction: column; border: 0.5px solid var(--border2); border-radius: 8px; overflow: hidden; }
    .cal-grid-gutter { width: 52px; flex-shrink: 0; }
    .cal-grid-header, .cal-allday-row { display: flex; border-bottom: 0.5px solid var(--border2); background: var(--bg3); }
    .cal-grid-daycol-header { flex: 1; text-align: center; padding: 8px 4px; display: flex; flex-direction: column; gap: 2px; }
    .cal-grid-daycol-header.is-today .week-day-num { color: var(--purple-light); }
    .cal-allday-row { min-height: 28px; background: var(--bg2); }
    .cal-allday-cell { flex: 1; padding: 3px 4px; display: flex; flex-direction: column; gap: 2px; cursor: pointer; border-left: 0.5px solid var(--border2); }
    .cal-allday-chip { font-size: 10px; color: #fff; border-radius: 4px; padding: 2px 6px; cursor: grab; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .week-day-name { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--text4); }
    .week-day-num { font-size: 15px; font-weight: 500; color: var(--text); }

    .cal-grid-scroll { display: flex; max-height: 520px; overflow-y: auto; position: relative; align-items: flex-start; }
    .cal-grid-hours { position: relative; flex-shrink: 0; }
    .cal-hour-label { position: absolute; right: 8px; font-size: 10px; color: var(--text4); background: var(--bg2); padding: 0 3px; line-height: 1; }

    .cal-grid-days { flex: 1; display: flex; }
    .cal-day-col {
      flex: 1; position: relative; border-left: 0.5px solid var(--border2); cursor: pointer;
      background-image: repeating-linear-gradient(to bottom, var(--border2) 0, var(--border2) 1px, transparent 1px, transparent 48px);
      transition: background-color .1s;
    }
    .cal-day-col.drag-over { background-color: var(--purple-bg); }
    .cal-allday-cell.drag-over { background-color: var(--purple-bg); }
    .cal-event-block {
      position: absolute; left: 2px; right: 2px; border-radius: 4px; padding: 3px 6px; overflow: hidden;
      cursor: grab; font-size: 11px; line-height: 1.3; color: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.25); z-index: 1;
    }
    .cal-event-block.dragging, .cal-allday-chip.dragging { opacity: .35; }
    .cal-event-block .evt-title { display: block; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cal-event-block .evt-time { display: block; font-size: 9px; opacity: .85; }
    .cal-now-line { position: absolute; left: 0; right: 0; height: 0; border-top: 2px solid var(--red); z-index: 2; }
    .cal-now-dot { position: absolute; left: -4px; top: -5px; width: 9px; height: 9px; border-radius: 50%; background: var(--red); }

    @media (max-width: 768px) {
      .stat-grid-4 { grid-template-columns: repeat(2, 1fr); }
      .stat-grid-3 { grid-template-columns: 1fr; }
      .settings-grid { grid-template-columns: repeat(2, 1fr); }
      .cal-grid-gutter { width: 36px; }
      .cal-grid-daycol-header { padding: 6px 2px; }
      .cal-hour-label { font-size: 9px; right: 4px; }
    }

    .empty-state { text-align: center; padding: 20px 10px; color: var(--text4); font-size: 12px; }
    .loading-text { color: var(--text4); font-size: 13px; text-align: center; padding: 16px; }

    /* ── COLOR HELPERS ── */
    .g { color: var(--green); }
    .a { color: var(--amber); }
    .r { color: var(--red); }
    .p { color: var(--purple-light); }
    .b { color: var(--blue); }
    .w { color: var(--text); }
    .dim { color: var(--text4); }
  </style>

  <!-- Apply saved theme immediately — prevents flash on load -->
  <script>
    if (localStorage.getItem('os_theme') === 'cream') document.documentElement.classList.add('theme-cream-pending');
  </script>
  <style>
    .theme-cream-pending body, body.theme-cream { }
  </style>
</head>
<body>

<div class="topbar">
  <div class="tb-nav-row">
    <div class="tb-logo">
      <span class="tb-icon">⚡</span>
      <span class="tb-title">OS</span>
    </div>

    <div class="nav-tabs" id="tab-bar">
      <div class="tab-btn active" data-tab="daily">📅 Daily</div>
      <div class="tab-btn" data-tab="trading">📈 Trading</div>
      <div class="tab-btn" data-tab="fitness">💪 Fitness</div>
      <div class="tab-btn" data-tab="goals">🎯 Goals</div>
      <div class="tab-btn" data-tab="calendar">📆 Calendar</div>
      <div class="tab-btn" data-tab="expenses">💳 Expenses</div>
    </div>

    <div class="tb-right-cluster">
      <div class="tb-icon-group">
        <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
          <span class="theme-toggle-icon" id="theme-icon">🌙</span>
        </div>
        <div class="theme-toggle" id="logout-btn" title="Log out" onclick="confirmLogout()">
          <span class="theme-toggle-icon">🚪</span>
        </div>
      </div>
      <div class="tb-clock">
        <div class="tb-clock-time" id="live-time">—</div>
        <div class="tb-clock-date" id="live-date">—</div>
      </div>
    </div>
  </div>

  <div class="topbar-welcome">
    <div class="tb-hero">
      <div class="tb-hero-greeting">Welcome back, Andres</div>
      <div class="tb-hero-sub">Execute today's mission.</div>
      <div class="tb-status" id="topbar-status"></div>
    </div>
  </div>
</div>

<div id="app">
  <div class="main">
    <div id="tab-content">
      <p class="loading-text">Loading...</p>
    </div>
  </div>
</div>

<!-- Supabase client library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Chart.js for Trading tab charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<!-- Google Identity Services (for Calendar OAuth) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script src="app.js"></script>
<script>
  document.getElementById('tab-bar').addEventListener('click', (e) => {
    const btn = e.target.closest('.tab-btn');
    if (btn) switchTab(btn.dataset.tab);
  });

  function applyTheme(theme) {
    if (theme === 'cream') {
      document.body.classList.add('theme-cream');
      document.getElementById('theme-icon').textContent = '☀️';
    } else {
      document.body.classList.remove('theme-cream');
      document.getElementById('theme-icon').textContent = '🌙';
    }
  }

  function toggleTheme() {
    const current = localStorage.getItem('os_theme') || 'dark';
    const next = current === 'dark' ? 'cream' : 'dark';
    localStorage.setItem('os_theme', next);
    applyTheme(next);
  }

  // Apply saved theme on load
  applyTheme(localStorage.getItem('os_theme') || 'dark');

  // Live clock — compact: HH:MM (no seconds) + weekday only, to keep this
  // from competing visually with the actual content below it.
  function updateClock() {
    const now = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    document.getElementById('live-time').textContent = `${h}:${m}`;
    document.getElementById('live-date').textContent = days[now.getDay()];
  }
  updateClock();
  setInterval(updateClock, 30000);
</script>
</body>
</html>
