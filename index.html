<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OS — Andres Villamil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ============================================
       DESIGN TOKENS — DARK THEME (default)
       All variable NAMES are unchanged from the original
       stylesheet because app.js references them directly
       via inline style="color:var(--x)" strings throughout
       (scoreColor(), PRIORITY_STYLE, STATUS_STYLE, netResult
       coloring, etc). Only values + additive tokens changed.
       ============================================ */
    :root {
      /* Canvas & surfaces — real elevation ladder */
      --bg: #0A0B0D;
      --bg2: #101217;
      --bg3: #161920;
      --bg-elevated: #1C2029;

      --border: #262B34;
      --border2: #1B1E25;
      --border-strong: #383F4C;

      /* Text */
      --text: #EDEEF1;
      --text2: #B4B9C3;
      --text3: #7B8190;
      --text4: #4A505C;

      /* Brand accent — reserved for primary action + active state */
      --green: #2FAD7C;
      --green-bg: #0E211A;
      --green-border: #1D4536;

      --amber: #DFA23E;
      --amber-bg: #221B0D;
      --amber-border: #453419;

      --red: #E15E5D;
      --red-bg: #251313;
      --red-border: #442121;

      --purple: #5B67D6;
      --purple-light: #8C94E8;
      --purple-bg: #161A31;
      --purple-border: #333A6C;

      --blue: #4894E0;
      --blue-bg: #101F2E;

      --topbar-bg: #0C0D10;
      --radius: 10px;
      --radius-sm: 6px;
      --radius-lg: 14px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      /* Spacing scale */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 28px;

      /* Motion */
      --duration-fast: 120ms;
      --duration-base: 200ms;
      --ease-standard: cubic-bezier(.4,0,.2,1);

      /* Elevation shadows — used sparingly, borders carry most of the weight */
      --shadow-sm: 0 1px 2px rgba(0,0,0,.35);
      --shadow-md: 0 6px 20px rgba(0,0,0,.4);

      /* Focus ring */
      --focus-ring: 0 0 0 2px var(--bg), 0 0 0 4px var(--purple-light);
    }

    /* ── WARM CREAM THEME — same tokens, light values ── */
    body.theme-cream {
      --bg: #F3EFE8;
      --bg2: #FBF8F3;
      --bg3: #EDE9E1;
      --bg-elevated: #FFFFFF;

      --border: #D6D1C7;
      --border2: #DEDACF;
      --border-strong: #B8B2A5;

      --text: #1B1916;
      --text2: #2E2B26;
      --text3: #666058;
      --text4: #9A948A;

      --green: #10775A;
      --green-bg: #E3F2EA;
      --green-border: #A6D6C1;

      --amber: #9C6708;
      --amber-bg: #FBF0DA;
      --amber-border: #E4CA86;

      --red: #BC302E;
      --red-bg: #F9E9E9;
      --red-border: #E9B2B1;

      --purple: #4C449E;
      --purple-light: #635AC2;
      --purple-bg: #ECEBFA;
      --purple-border: #C0BCE9;

      --blue: #1A62B0;
      --blue-bg: #E3EDF7;

      --topbar-bg: #ECE8DF;
      --shadow-sm: 0 1px 2px rgba(30,25,15,.08);
      --shadow-md: 0 6px 20px rgba(30,25,15,.10);
      --focus-ring: 0 0 0 2px var(--bg), 0 0 0 4px var(--purple);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      transition: background var(--duration-base) var(--ease-standard),
                  color var(--duration-base) var(--ease-standard);
    }

    /* ── Global focus ring — visible keyboard focus everywhere ── */
    :focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
      border-radius: var(--radius-sm);
    }

    /* ── Respect reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--topbar-bg);
      border-bottom: 1px solid var(--border2);
      padding: 14px 20px;
      transition: padding var(--duration-base) var(--ease-standard),
                  background var(--duration-base) var(--ease-standard);
    }
    .topbar.scrolled { padding: 9px 20px; }

    .tb-row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .tb-logo { display: flex; align-items: center; gap: 10px; }
    .tb-icon { font-size: 19px; color: var(--purple-light); }
    .tb-title { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: .01em; }

    .nav-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--border2);
      font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap;
      background: var(--bg2); color: var(--text4);
      transition: all var(--duration-fast) var(--ease-standard);
      user-select: none;
    }
    .tab-btn:hover { color: var(--text2); border-color: var(--border-strong); background: var(--bg3); }
    .tab-btn.active { background: var(--purple); color: #F1F1FB; border-color: var(--purple); }

    .theme-toggle {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px; cursor: pointer;
      border: 1px solid var(--border); background: var(--bg2);
      color: var(--text3); font-size: 11px; font-weight: 500;
      transition: all var(--duration-fast) var(--ease-standard);
      white-space: nowrap; user-select: none;
    }
    .theme-toggle:hover { border-color: var(--purple-border); color: var(--purple-light); background: var(--purple-bg); }
    .theme-toggle-icon { font-size: 14px; }

    /* ── MAIN CONTENT ── */
    .main { padding: 20px; max-width: 1400px; margin: 0 auto; }

    /* ── CARDS ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-sm);
      transition: background var(--duration-base) var(--ease-standard),
                  border-color var(--duration-base) var(--ease-standard);
    }
    .card-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text3); margin-bottom: 10px;
    }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .card-meta { font-size: 11px; color: var(--text4); }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } .main { padding: 12px; } }

    /* ── IDENTITY BANNER (motivation quotes) — neutral surface, not purple-flooded ── */
    .identity-banner {
      border-left: 2px solid var(--purple-border);
      padding: 10px 14px; background: var(--bg3);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin-bottom: 16px; font-size: 12px; color: var(--purple-light);
      line-height: 1.7; font-style: italic; font-weight: 500;
    }

    /* ── CHECKLISTS ── */
    .check-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border2);
      transition: background var(--duration-fast) var(--ease-standard);
    }
    .check-row:last-child { border-bottom: none; }
    .check-row input[type="checkbox"] {
      width: 18px; height: 18px; flex-shrink: 0;
      accent-color: var(--green); cursor: pointer;
    }
    .check-label { font-size: 12px; color: var(--text2); }
    .muted-italic { color: var(--text4); font-style: italic; }

    /* ── TOP GOALS / TASK LIST ── */
    .goal-slot {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; background: var(--bg3);
      border-radius: var(--radius-sm); margin-bottom: 6px;
      border: 1px solid var(--border2);
      transition: border-color var(--duration-fast) var(--ease-standard);
    }
    .goal-slot:focus-within { border-color: var(--purple-border); }
    .goal-num { font-size: 11px; font-weight: 600; color: var(--purple-light); min-width: 18px; }
    .goal-slot input[type="text"] {
      flex: 1; background: transparent; border: none;
      font-size: 12px; color: var(--text2); outline: none; font-family: var(--font);
    }

    /* ── FORMS & BUTTONS ── */
    .btn-secondary {
      background: var(--purple); color: #F1F1FB; border: none;
      border-radius: var(--radius-sm); padding: 7px 14px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      transition: filter var(--duration-fast) var(--ease-standard),
                  transform var(--duration-fast) var(--ease-standard);
    }
    .btn-secondary:hover { filter: brightness(1.12); }
    .btn-secondary:active { transform: translateY(1px); }
    .btn-secondary:disabled { opacity: .5; cursor: not-allowed; }

    input[type="text"], input[type="email"], input[type="password"],
    input[type="date"], input[type="time"], input[type="number"], select {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 7px 10px;
      font-size: 12px; color: var(--text2); outline: none; font-family: var(--font);
      transition: border-color var(--duration-fast) var(--ease-standard);
    }
    input:focus, select:focus { border-color: var(--purple-border); }

    /* ── MATRIX LOGIN SCREEN — concept preserved, contrast tightened ── */
    .matrix-login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #000; position: relative; overflow: hidden;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
    }
    #matrix-rain-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    .matrix-login-box {
      position: relative; z-index: 1; width: 100%; max-width: 340px;
      background: rgba(0,0,0,0.82); border: 1px solid #0F0; border-radius: 6px;
      padding: 34px 28px; text-align: center;
      box-shadow: 0 0 24px rgba(0,255,70,0.2), inset 0 0 20px rgba(0,255,70,0.04);
      animation: matrix-flicker-in .5s var(--ease-standard);
    }
    @keyframes matrix-flicker-in { 0% { opacity: 0; } 40% { opacity: .6; } 55% { opacity: .2; } 100% { opacity: 1; } }
    .matrix-login-title {
      color: #0F0; font-size: 18px; letter-spacing: 3px; margin-bottom: 6px; text-transform: uppercase;
      text-shadow: 0 0 6px rgba(0,255,70,0.7);
    }
    .matrix-login-sub { color: #0a0; font-size: 11px; letter-spacing: 3px; margin-bottom: 26px; text-transform: uppercase; opacity: .75; }
    .matrix-login-form { display: flex; flex-direction: column; gap: 16px; }
    .matrix-input-wrap {
      display: flex; align-items: center; gap: 8px; border: 1px solid #0a0; border-radius: 4px;
      padding: 11px 12px; background: rgba(0,25,0,0.4);
    }
    .matrix-input-wrap span { color: #0F0; font-size: 13px; }
    .matrix-login-form input[type="password"] {
      flex: 1; background: transparent; border: none; outline: none; color: #0F0;
      font-family: inherit; font-size: 14px; letter-spacing: 3px;
    }
    .matrix-login-form input::placeholder { color: rgba(0,255,70,0.3); letter-spacing: 1px; }
    .matrix-login-btn {
      background: #0F0; color: #000; border: none; border-radius: 4px; padding: 11px;
      font-family: inherit; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
      font-size: 12px; cursor: pointer; transition: box-shadow var(--duration-base) var(--ease-standard);
    }
    .matrix-login-btn:hover { box-shadow: 0 0 16px rgba(0,255,70,0.55); }
    .matrix-login-btn:focus-visible { outline: 2px solid #0F0; outline-offset: 2px; box-shadow: none; }
    .matrix-login-error { color: #ff5b5b; font-size: 11px; margin-top: 16px; letter-spacing: 1px; min-height: 14px; }

    /* ── TRADING TAB ── */
    .stat-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .stat-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat-box {
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: var(--radius-sm); padding: 12px; text-align: center;
    }
    .stat-box-value { font-size: 22px; font-weight: 600; letter-spacing: -.01em; }
    .stat-box-label { font-size: 10px; color: var(--text4); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }
    .chart-wrap { position: relative; height: 220px; margin-top: 6px; }
    .chart-wrap-sm { position: relative; height: 180px; margin-top: 6px; }
    .upload-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .upload-status { font-size: 11px; color: var(--text4); }
    .settings-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .settings-field label { font-size: 10px; color: var(--text4); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
    .settings-field input { width: 100%; }
    .progress-track { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; background: var(--purple); border-radius: 4px; transition: width var(--duration-base) var(--ease-standard); }
    .file-input-btn {
      display: inline-block; background: var(--purple); color: #F1F1FB;
      border-radius: var(--radius-sm); padding: 7px 14px; font-size: 11px; font-weight: 600; cursor: pointer;
      transition: filter var(--duration-fast) var(--ease-standard);
    }
    .file-input-btn:hover { filter: brightness(1.12); }
    .file-input-btn input { display: none; }
    .settings-gear-btn { cursor: pointer; font-size: 15px; opacity: .55; transition: opacity var(--duration-fast), transform var(--duration-fast); user-select: none; padding: 2px 4px; }
    .settings-gear-btn:hover { opacity: 1; transform: rotate(20deg); }
    .settings-panel {
      margin-top: 12px; padding: 12px; border-top: 1px solid var(--border2);
      background: var(--bg-elevated); border-radius: 0 0 var(--radius-sm) var(--radius-sm);
    }

    /* ── CALENDAR TAB — hour-based time grid ── */
    .week-nav-btn {
      background: var(--bg3); border: 1px solid var(--border2); color: var(--text2);
      border-radius: var(--radius-sm); padding: 6px 14px; font-size: 12px; cursor: pointer; white-space: nowrap;
      transition: all var(--duration-fast) var(--ease-standard);
    }
    .week-nav-btn:hover { border-color: var(--purple-border); color: var(--purple-light); }

    .cal-grid-wrap { display: flex; flex-direction: column; border: 1px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; }
    .cal-grid-gutter { width: 52px; flex-shrink: 0; }
    .cal-grid-header, .cal-allday-row { display: flex; border-bottom: 1px solid var(--border2); background: var(--bg3); }
    .cal-grid-daycol-header { flex: 1; text-align: center; padding: 8px 4px; display: flex; flex-direction: column; gap: 2px; }
    .cal-grid-daycol-header.is-today .week-day-num { color: var(--purple-light); }
    .cal-allday-row { min-height: 28px; background: var(--bg2); }
    .cal-allday-cell {
      flex: 1; padding: 3px 4px; display: flex; flex-direction: column; gap: 2px; cursor: pointer;
      border-left: 1px solid var(--border2);
      transition: background var(--duration-fast) var(--ease-standard);
    }
    .cal-allday-chip { font-size: 10px; color: #fff; border-radius: 4px; padding: 2px 6px; cursor: grab; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .week-day-name { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--text4); }
    .week-day-num { font-size: 15px; font-weight: 600; color: var(--text); }

    .cal-grid-scroll { display: flex; max-height: 520px; overflow-y: auto; position: relative; align-items: flex-start; }
    .cal-grid-hours { position: relative; flex-shrink: 0; }
    .cal-hour-label { position: absolute; right: 8px; font-size: 10px; color: var(--text4); background: var(--bg2); padding: 0 3px; line-height: 1; }

    .cal-grid-days { flex: 1; display: flex; }
    .cal-day-col {
      flex: 1; position: relative; border-left: 1px solid var(--border2); cursor: pointer;
      background-image: repeating-linear-gradient(to bottom, var(--border2) 0, var(--border2) 1px, transparent 1px, transparent 48px);
      transition: background-color var(--duration-fast) var(--ease-standard);
    }
    .cal-day-col.drag-over { background-color: var(--purple-bg); }
    .cal-allday-cell.drag-over { background-color: var(--purple-bg); }
    .cal-event-block {
      position: absolute; left: 2px; right: 2px; border-radius: 4px; padding: 3px 6px; overflow: hidden;
      cursor: grab; font-size: 11px; line-height: 1.3; color: #fff; box-shadow: var(--shadow-sm); z-index: 1;
      transition: box-shadow var(--duration-fast) var(--ease-standard);
    }
    .cal-event-block:hover { box-shadow: var(--shadow-md); }
    .cal-event-block.dragging, .cal-allday-chip.dragging { opacity: .35; }
    .cal-event-block .evt-title { display: block; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cal-event-block .evt-time { display: block; font-size: 9px; opacity: .85; }
    .cal-now-line { position: absolute; left: 0; right: 0; height: 0; border-top: 2px solid var(--red); z-index: 2; }
    .cal-now-dot { position: absolute; left: -4px; top: -5px; width: 9px; height: 9px; border-radius: 50%; background: var(--red); }

    @media (max-width: 768px) {
      .stat-grid-4 { grid-template-columns: repeat(2, 1fr); }
      .stat-grid-3 { grid-template-columns: 1fr; }
      .settings-grid { grid-template-columns: repeat(2, 1fr); }
      .cal-grid-gutter { width: 36px; }
      .cal-grid-daycol-header { padding: 6px 2px; }
      .cal-hour-label { font-size: 9px; right: 4px; }
    }
    @media (max-width: 480px) {
      .settings-grid { grid-template-columns: 1fr; }
    }

    /* ── TOPBAR SCROLL BEHAVIOUR ── */
    .topbar-welcome {
      transition: max-height var(--duration-base) var(--ease-standard),
                  opacity var(--duration-fast) var(--ease-standard),
                  padding var(--duration-base) var(--ease-standard);
      overflow: hidden; max-height: 40px; opacity: 1; padding: 6px 0 4px;
    }
    .topbar.scrolled .topbar-welcome { max-height: 0; opacity: 0; padding: 0; }

    .empty-state { text-align: center; padding: 20px 10px; color: var(--text4); font-size: 12px; }
    .loading-text { color: var(--text4); font-size: 13px; text-align: center; padding: 16px; }

    /* ── COLOR HELPERS ── */
    .g { color: var(--green); }
    .a { color: var(--amber); }
    .r { color: var(--red); }
    .p { color: var(--purple-light); }
    .b { color: var(--blue); }
    .w { color: var(--text); }
    .dim { color: var(--text4); }
  </style>

  <!-- Apply saved theme immediately — prevents flash on load -->
  <script>
    if (localStorage.getItem('os_theme') === 'cream') document.documentElement.classList.add('theme-cream-pending');
  </script>
</head>
<body>

<div class="topbar">
  <div class="tb-row1">
    <div class="tb-logo">
      <div class="tb-icon">⚡</div>
      <div>
        <div class="tb-title">OS — Andres Villamil</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:12px;">
      <div style="text-align:right;">
        <div id="live-time" style="font-size:18px; font-weight:600; color:var(--text); line-height:1; font-variant-numeric:tabular-nums;">—</div>
        <div id="live-date" style="font-size:11px; color:var(--text4); margin-top:2px;">—</div>
      </div>
      <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
        <span class="theme-toggle-icon" id="theme-icon">🌙</span>
      </div>
      <div class="theme-toggle" id="logout-btn" title="Log out" onclick="confirmLogout()">
        <span class="theme-toggle-icon">🚪</span>
      </div>
    </div>
  </div>

  <!-- Centered calligraphy welcome -->
  <div class="topbar-welcome" style="text-align:center; position:relative;">
    <span style="font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif; font-size:17px; font-style:italic; font-weight:400; color:var(--purple-light); letter-spacing:0.04em;">Welcome back, future Millionaire</span>
    <span style="font-size:14px; margin-left:6px;">👑</span>
  </div>

  <div class="nav-tabs" id="tab-bar">
    <div class="tab-btn active" data-tab="daily">📅 Daily</div>
    <div class="tab-btn" data-tab="trading">📈 Trading</div>
    <div class="tab-btn" data-tab="fitness">💪 Fitness</div>
    <div class="tab-btn" data-tab="goals">🎯 Goals</div>
    <div class="tab-btn" data-tab="calendar">📆 Calendar</div>
    <div class="tab-btn" data-tab="expenses">💳 Expenses</div>
  </div>
</div>

<div id="app">
  <div class="main">
    <div id="tab-content">
      <p class="loading-text">Loading...</p>
    </div>
  </div>
</div>

<!-- Supabase client library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Chart.js for Trading tab charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<!-- Google Identity Services (for Calendar OAuth) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script src="app.js"></script>
<script>
  document.getElementById('tab-bar').addEventListener('click', (e) => {
    const btn = e.target.closest('.tab-btn');
    if (btn) switchTab(btn.dataset.tab);
  });

  function applyTheme(theme) {
    if (theme === 'cream') {
      document.body.classList.add('theme-cream');
      document.getElementById('theme-icon').textContent = '☀️';
    } else {
      document.body.classList.remove('theme-cream');
      document.getElementById('theme-icon').textContent = '🌙';
    }
  }

  function toggleTheme() {
    const current = localStorage.getItem('os_theme') || 'dark';
    const next = current === 'dark' ? 'cream' : 'dark';
    localStorage.setItem('os_theme', next);
    applyTheme(next);
  }

  // Apply saved theme on load
  applyTheme(localStorage.getItem('os_theme') || 'dark');

  // Scroll-aware topbar
  let topbarTicking = false;
  window.addEventListener('scroll', () => {
    if (topbarTicking) return;
    topbarTicking = true;
    requestAnimationFrame(() => {
      const topbar = document.querySelector('.topbar');
      if (topbar) {
        const isScrolled = topbar.classList.contains('scrolled');
        if (!isScrolled && window.scrollY > 60) {
          topbar.classList.add('scrolled');
        } else if (isScrolled && window.scrollY < 20) {
          topbar.classList.remove('scrolled');
        }
      }
      topbarTicking = false;
    });
  }, { passive: true });

  // Live clock
  function updateClock() {
    const now = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    const s = now.getSeconds().toString().padStart(2,'0');
    document.getElementById('live-time').textContent = `${h}:${m}:${s}`;
    document.getElementById('live-date').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
