<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OS — Andres Villamil</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── DARK THEME (default) ── */
    :root {
      --bg: #0a0a0a;
      --bg2: #141414;
      --bg3: #1a1a1a;
      --border: #2a2a2a;
      --border2: #1e1e1e;
      --text: #ffffff;
      --text2: #cccccc;
      --text3: #888888;
      --text4: #444444;
      --green: #1D9E75;
      --green-bg: #0a2018;
      --green-border: #0f3a28;
      --amber: #EF9F27;
      --amber-bg: #1a1200;
      --amber-border: #3a2800;
      --red: #E24B4A;
      --red-bg: #2a0a0a;
      --red-border: #4a1010;
      --purple: #534AB7;
      --purple-light: #7F77DD;
      --purple-bg: #12102a;
      --purple-border: #2a2850;
      --blue: #378ADD;
      --blue-bg: #0c1a2e;
      --topbar-bg: #0f0f0f;
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── WARM CREAM THEME ── */
    body.theme-cream {
      --bg: #F5F1EB;
      --bg2: #FDFAF5;
      --bg3: #EDEAE3;
      --border: #D0CCC4;
      --border2: #D8D4CC;
      --text: #1A1814;
      --text2: #2D2A26;
      --text3: #666058;
      --text4: #9E9890;
      --green: #0F7A58;
      --green-bg: #E4F3EC;
      --green-border: #A8D8C4;
      --amber: #A86C0A;
      --amber-bg: #FBF1DC;
      --amber-border: #E8CC88;
      --red: #C0312F;
      --red-bg: #FAEAEA;
      --red-border: #EBB4B4;
      --purple: #534AB7;
      --purple-light: #6B62CC;
      --purple-bg: #EEEDFE;
      --purple-border: #C4C0F0;
      --blue: #1A68C0;
      --blue-bg: #E4EEF9;
      --topbar-bg: #EDEAE3;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; transition: background .2s, color .2s; }

    /* ── TOP BAR ── */
    .topbar { position: sticky; top: 0; z-index: 100; background: var(--topbar-bg); border-bottom: 0.5px solid var(--border2); padding: 12px 20px; transition: background .2s; }
    .tb-row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .tb-logo { display: flex; align-items: center; gap: 10px; }
    .tb-icon { font-size: 20px; }
    .tb-title { font-size: 15px; font-weight: 500; color: var(--text); }
    .nav-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .tab-btn { display: flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 8px; border: 0.5px solid var(--border2); font-size: 12px; cursor: pointer; white-space: nowrap; background: var(--bg2); color: var(--text4); transition: all .15s; user-select: none; }
    .tab-btn:hover { color: var(--text3); border-color: var(--border); }
    .tab-btn.active { background: var(--purple); color: #EEEDFE; border-color: var(--purple); }

    /* ── THEME TOGGLE BUTTON ── */
    .theme-toggle {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px; cursor: pointer;
      border: 0.5px solid var(--border); background: var(--bg2);
      color: var(--text3); font-size: 11px; font-weight: 500;
      transition: all .15s; white-space: nowrap; user-select: none;
    }
    .theme-toggle:hover { border-color: var(--purple); color: var(--purple-light); }
    .theme-toggle-icon { font-size: 14px; }

    /* ── MAIN CONTENT ── */
    .main { padding: 20px; max-width: 1400px; margin: 0 auto; }

    /* ── CARDS ── */
    .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; transition: background .2s, border-color .2s; }
    .card-title { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 10px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .card-meta { font-size: 11px; color: var(--text4); }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } .main { padding: 12px; } }

    /* ── IDENTITY BANNER ── */
    .identity-banner { border-left: 2px solid var(--purple); padding: 10px 14px; background: var(--purple-bg); border-radius: 0 8px 8px 0; margin-bottom: 16px; font-size: 12px; color: #7F77DD; line-height: 1.7; font-style: italic; font-weight: 500; }
    body.theme-cream .identity-banner { color: #534AB7; }

    /* ── CHECKLISTS ── */
    .check-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--border2); }
    .check-row:last-child { border-bottom: none; }
    .check-row input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; accent-color: var(--green); cursor: pointer; }
    .check-label { font-size: 12px; color: var(--text2); }
    .muted-italic { color: var(--text4); font-style: italic; }

    /* ── TOP GOALS / TASK LIST ── */
    .goal-slot { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: var(--bg3); border-radius: 8px; margin-bottom: 6px; border: 0.5px solid var(--border2); }
    .goal-num { font-size: 11px; font-weight: 500; color: var(--purple-light); min-width: 18px; }
    .goal-slot input[type="text"] { flex: 1; background: transparent; border: none; font-size: 12px; color: var(--text2); outline: none; font-family: var(--font); }

    /* ── FORMS ── */
    .btn-secondary { background: var(--purple); color: #EEEDFE; border: none; border-radius: 7px; padding: 7px 14px; font-size: 11px; font-weight: 500; cursor: pointer; }
    input[type="text"], input[type="email"], input[type="password"] { background: var(--bg3); border: 0.5px solid var(--border); border-radius: 7px; padding: 7px 10px; font-size: 12px; color: var(--text2); outline: none; font-family: var(--font); }

    /* ── LOGIN SCREEN ── */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box { width: 100%; max-width: 320px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 28px 24px; }
    .login-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
    .login-sub { font-size: 12px; color: var(--text4); margin-bottom: 18px; }
    .login-form { display: flex; flex-direction: column; gap: 10px; }
    .login-error { color: var(--red); font-size: 12px; margin-top: 10px; }

    /* ── TRADING TAB ── */
    .stat-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .stat-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat-box { background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 8px; padding: 12px; text-align: center; }
    .stat-box-value { font-size: 22px; font-weight: 500; }
    .stat-box-label { font-size: 10px; color: var(--text4); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }
    .chart-wrap { position: relative; height: 220px; margin-top: 6px; }
    .chart-wrap-sm { position: relative; height: 180px; margin-top: 6px; }
    .upload-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .upload-status { font-size: 11px; color: var(--text4); }
    .settings-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .settings-field label { font-size: 10px; color: var(--text4); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
    .settings-field input { width: 100%; }
    .progress-track { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; background: var(--purple); border-radius: 4px; transition: width .3s; }
    .file-input-btn { display: inline-block; background: var(--purple); color: #EEEDFE; border-radius: 7px; padding: 7px 14px; font-size: 11px; font-weight: 500; cursor: pointer; }
    .file-input-btn input { display: none; }
    @media (max-width: 768px) {
      .stat-grid-4 { grid-template-columns: repeat(2, 1fr); }
      .stat-grid-3 { grid-template-columns: 1fr; }
      .settings-grid { grid-template-columns: repeat(2, 1fr); }
    }
    /* ── TOPBAR SCROLL BEHAVIOUR ── */
    .topbar { transition: padding .25s ease; }
    .topbar.scrolled { padding: 8px 20px; }
    .topbar-welcome { transition: max-height .25s ease, opacity .2s ease, padding .25s ease; overflow: hidden; max-height: 40px; opacity: 1; padding: 6px 0 4px; }
    .topbar.scrolled .topbar-welcome { max-height: 0; opacity: 0; padding: 0; }

    .empty-state { text-align: center; padding: 20px 10px; color: var(--text4); font-size: 12px; }
    .loading-text { color: var(--text4); font-size: 13px; text-align: center; padding: 16px; }

    /* ── COLOR HELPERS ── */
    .g { color: var(--green); }
    .a { color: var(--amber); }
    .r { color: var(--red); }
    .p { color: var(--purple-light); }
    .b { color: var(--blue); }
    .w { color: var(--text); }
    .dim { color: var(--text4); }
  </style>

  <!-- Apply saved theme immediately — prevents flash on load -->
  <script>
    if (localStorage.getItem('os_theme') === 'cream') document.documentElement.classList.add('theme-cream-pending');
  </script>
  <style>
    .theme-cream-pending body, body.theme-cream { }
  </style>
</head>
<body>

<div class="topbar">
  <div class="tb-row1">
    <div class="tb-logo">
      <div class="tb-icon">⚡</div>
      <div>
        <div class="tb-title">OS — Andres Villamil</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:12px;">
      <div style="text-align:right;">
        <div id="live-time" style="font-size:18px; font-weight:500; color:var(--text); line-height:1; font-variant-numeric:tabular-nums;">—</div>
        <div id="live-date" style="font-size:11px; color:var(--text4); margin-top:2px;">—</div>
      </div>
      <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
        <span class="theme-toggle-icon" id="theme-icon">🌙</span>
      </div>
    </div>
  </div>

  <!-- Centered calligraphy welcome -->
  <div class="topbar-welcome" style="text-align:center; position:relative;">
    <span style="font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif; font-size:17px; font-style:italic; font-weight:400; color:var(--purple-light); letter-spacing:0.04em;">Welcome back, future Millionaire</span>
    <span style="font-size:14px; margin-left:6px;">👑</span>
  </div>

  <div class="nav-tabs" id="tab-bar">
    <div class="tab-btn active" data-tab="daily">📅 Daily</div>
    <div class="tab-btn" data-tab="trading">📈 Trading</div>
    <div class="tab-btn" data-tab="fitness">💪 Fitness</div>
    <div class="tab-btn" data-tab="goals">🎯 Goals</div>
    <div class="tab-btn" data-tab="calendar">📆 Calendar</div>
  </div>
</div>

<div id="app">
  <div class="main">
    <div id="tab-content">
      <p class="loading-text">Loading...</p>
    </div>
  </div>
</div>

<!-- Supabase client library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Chart.js for Trading tab charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<!-- Google Identity Services (for Calendar OAuth) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script src="app.js"></script>
<script>
  document.getElementById('tab-bar').addEventListener('click', (e) => {
    const btn = e.target.closest('.tab-btn');
    if (btn) switchTab(btn.dataset.tab);
  });

  function applyTheme(theme) {
    if (theme === 'cream') {
      document.body.classList.add('theme-cream');
      document.getElementById('theme-icon').textContent = '☀️';
    } else {
      document.body.classList.remove('theme-cream');
      document.getElementById('theme-icon').textContent = '🌙';
    }
  }

  function toggleTheme() {
    const current = localStorage.getItem('os_theme') || 'dark';
    const next = current === 'dark' ? 'cream' : 'dark';
    localStorage.setItem('os_theme', next);
    applyTheme(next);
  }

  // Apply saved theme on load
  applyTheme(localStorage.getItem('os_theme') || 'dark');

  // Scroll-aware topbar
  // Two different thresholds (enter/exit) instead of one — toggling the
  // 'scrolled' class shrinks the topbar's own height (padding + collapsing
  // the welcome banner), and since the topbar sits in normal document flow,
  // that shrink shifts scrollY slightly. With a single threshold that nudge
  // was enough to cross back over the same line, flickering on/off rapidly.
  // A gap between the enter and exit points removes that feedback loop.
  let topbarTicking = false;
  window.addEventListener('scroll', () => {
    if (topbarTicking) return;
    topbarTicking = true;
    requestAnimationFrame(() => {
      const topbar = document.querySelector('.topbar');
      if (topbar) {
        const isScrolled = topbar.classList.contains('scrolled');
        if (!isScrolled && window.scrollY > 60) {
          topbar.classList.add('scrolled');
        } else if (isScrolled && window.scrollY < 20) {
          topbar.classList.remove('scrolled');
        }
      }
      topbarTicking = false;
    });
  }, { passive: true });

  // Live clock
  function updateClock() {
    const now = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    const s = now.getSeconds().toString().padStart(2,'0');
    document.getElementById('live-time').textContent = `${h}:${m}:${s}`;
    document.getElementById('live-date').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
